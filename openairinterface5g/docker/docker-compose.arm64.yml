################################################################################
# Docker Compose for OAI 5G gNB and nrUE on ARM64 with RF Simulator
# Includes E2/E3 agent support
################################################################################

version: '3.8'

services:
  oai-gnb:
    image: ibs/oai-gnb:latest-arm64
    container_name: rfsim-oai-gnb
    privileged: true
    network_mode: host
    environment:
      TZ: Europe/Paris
      USE_ADDITIONAL_OPTIONS: --sa --rfsim --log_config.global_log_options level,nocolor,time
    volumes:
      - ../targets/PROJECTS/GENERIC-NR-5GC/CONF/gnb.sa.band78.fr1.106PRB.usrpb210.conf:/opt/oai-gnb/etc/gnb.conf:ro
    command: >
      /opt/oai-gnb/bin/nr-softmodem
      -O /opt/oai-gnb/etc/gnb.conf
      --gNBs.[0].min_rxtxtime 6
      --sa
      --rfsim
      --rfsimulator.serveraddr server
      --log_config.global_log_options level,nocolor,time
    healthcheck:
      test: ["CMD-SHELL", "pgrep nr-softmodem || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    stdin_open: true
    tty: true

  oai-nr-ue:
    image: ibs/oai-nr-ue:latest-arm64
    container_name: rfsim-oai-nr-ue
    privileged: true
    network_mode: host
    environment:
      TZ: Europe/Paris
      USE_ADDITIONAL_OPTIONS: --rfsim --sa --log_config.global_log_options level,nocolor,time
    volumes:
      - ../targets/PROJECTS/GENERIC-NR-5GC/CONF/ue.conf:/opt/oai-nr-ue/etc/ue.conf:ro
    command: >
      /opt/oai-nr-ue/bin/nr-uesoftmodem
      --rfsim
      --rfsimulator.serveraddr 10.201.1.100
      -C 3619200000
      -r 106
      --numerology 1
      --ssb 516
      --sa
      -O /opt/oai-nr-ue/etc/ue.conf
      --log_config.global_log_options level,nocolor,time
    depends_on:
      oai-gnb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep nr-uesoftmodem || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    stdin_open: true
    tty: true

networks:
  default:
    driver: bridge
    name: oai-rfsim-net
